<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lily</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>Lily</h1>
    <span id="conn" class="badge">connecting…</span>
  </header>

  <main id="cards">
    <section class="card" id="card-status">
      <h2>Status</h2>
      <div class="body"><span class="muted">loading…</span></div>
    </section>
    <section class="card" id="card-system">
      <h2>System</h2>
      <div class="body"><span class="muted">loading…</span></div>
    </section>
    <section class="card" id="card-habits">
      <h2>Habits</h2>
      <div class="body"><span class="muted">loading…</span></div>
    </section>
    <section class="card" id="card-projects">
      <h2>Projects</h2>
      <div class="body"><span class="muted">loading…</span></div>
    </section>
    <section class="card" id="card-facts">
      <h2>Facts</h2>
      <div class="body"><span class="muted">loading…</span></div>
    </section>
  </main>

  <script src="/app.js"></script>
  <script src="/card.js"></script>
</body>
</html>

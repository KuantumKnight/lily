# Lily configuration — copy to `lily.toml` and edit. All keys are optional.
# Environment variables (LILY_MODEL, LILY_OLLAMA_HOST, ...) override anything here.

[lily]
# Which local Ollama model is Lily's brain.
model = "qwen3:8b"

# Local embedding model for semantic recall (ollama pull nomic-embed-text).
embed_model = "nomic-embed-text"

# Local vision model for screenshot/image understanding (ollama pull llava:7b).
vision_model = "llava:7b"

# Where the Ollama server lives.
ollama_host = "http://localhost:11434"

# How many recent messages to feed back as conversational context.
context_window = 20

# Logging verbosity: DEBUG | INFO | WARNING | ERROR
log_level = "INFO"

# Speech-to-text model settings for faster-whisper.
stt_model = "base"
stt_device = "cpu"
stt_compute_type = "int8"

# Text-to-speech (Piper). Point tts_voice at a downloaded .onnx voice model.
tts_voice = ""
tts_autospeak = false

# Wake word (openWakeWord). Bundled name or a path to a custom .onnx/.tflite model.
wake_model = "hey_jarvis"
wake_threshold = 0.5

# Microphone capture for voice conversation (the `chat` command).
# Raise mic_silence_threshold if she stops too early; lower it if she never stops.
mic_silence_threshold = 500
mic_silence_seconds = 1.0
mic_max_seconds = 15.0

# Interrupts: barge_in lets a keypress cut off her speech; push_to_talk gates
# each turn behind a keypress instead of voice-activated recording.
barge_in = true
push_to_talk = false

# On-demand screenshots for the Prime vision layer. Captures are only taken when
# explicitly requested and are written under gitignored runtime data by default.
screenshot_dir = "data/screenshots"

# Encrypted memory-at-rest backups via the age CLI.
encrypted_db_path = "data/lily.db.age"
session_state_path = "data/session_state.json"
age_recipient = ""
age_identity = ""

# Explicit, opt-in cloud burst for hard queries only.
cloud_burst_enabled = false
cloud_burst_url = ""
cloud_burst_model = "gpt-4.1"
cloud_burst_key_env = "OPENAI_API_KEY"

# Let the dashboard show/hide cards based on current local data.
dashboard_adaptive = true

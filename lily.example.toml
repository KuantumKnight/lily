# Lily configuration — copy to `lily.toml` and edit. All keys are optional.
# Environment variables (LILY_MODEL, LILY_OLLAMA_HOST, ...) override anything here.

[lily]
# Which local Ollama model is Lily's brain.
model = "qwen3:8b"

# Where the Ollama server lives.
ollama_host = "http://localhost:11434"

# How many recent messages to feed back as conversational context.
context_window = 20

# Logging verbosity: DEBUG | INFO | WARNING | ERROR
log_level = "INFO"

# Speech-to-text model settings for faster-whisper.
stt_model = "base"
stt_device = "cpu"
stt_compute_type = "int8"

# Text-to-speech (Piper). Point tts_voice at a downloaded .onnx voice model.
tts_voice = ""
tts_autospeak = false

# Wake word (openWakeWord). Bundled name or a path to a custom .onnx/.tflite model.
wake_model = "hey_jarvis"
wake_threshold = 0.5

# Microphone capture for voice conversation (the `chat` command).
# Raise mic_silence_threshold if she stops too early; lower it if she never stops.
mic_silence_threshold = 500
mic_silence_seconds = 1.0
mic_max_seconds = 15.0
